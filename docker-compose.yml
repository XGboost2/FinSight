version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
      - fastembed_cache:/root/.cache/fastembed
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - HF_HOME=/root/.cache/huggingface
      - FASTEMBED_CACHE_PATH=/root/.cache/fastembed
    env_file:
      - .env
    depends_on:
      - qdrant
      - redis
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8000
      - VITE_ALPHA_VANTAGE_KEY=${VITE_ALPHA_VANTAGE_KEY}
    depends_on:
      - backend
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: celery -A celery_app worker --loglevel=info --concurrency=1 --pool=solo
    working_dir: /app
    volumes:
      - ./backend:/app
      - fastembed_cache:/root/.cache/fastembed
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - HF_HOME=/root/.cache/huggingface
      - FASTEMBED_CACHE_PATH=/root/.cache/fastembed
    env_file:
      - .env
    depends_on:
      - redis
      - qdrant
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
  fastembed_cache:
  hf_cache:
