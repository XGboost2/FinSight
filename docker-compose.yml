services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
      - fastembed_cache:/root/.cache/fastembed
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:?Set NEO4J_USER in .env}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      - NEO4J_DATABASE=${NEO4J_DATABASE:?Set NEO4J_DATABASE in .env}
      - REDIS_URL=${REDIS_URL:?Set REDIS_URL in .env}
      - HF_HOME=/root/.cache/huggingface
      - FASTEMBED_CACHE_PATH=/root/.cache/fastembed
    env_file:
      - .env
    depends_on:
      - qdrant
      - redis
      - neo4j
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      # API calls proxied via Vite server to http://backend:8000 — no VITE_API_URL needed
    depends_on:
      - backend
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: celery -A celery_app worker --loglevel=info --concurrency=1 --pool=solo
    working_dir: /app
    volumes:
      - ./backend:/app
      - fastembed_cache:/root/.cache/fastembed
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:?Set NEO4J_USER in .env}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      - NEO4J_DATABASE=${NEO4J_DATABASE:?Set NEO4J_DATABASE in .env}
      - REDIS_URL=${REDIS_URL:?Set REDIS_URL in .env}
      - HF_HOME=/root/.cache/huggingface
      - FASTEMBED_CACHE_PATH=/root/.cache/fastembed
    env_file:
      - .env
    depends_on:
      - redis
      - qdrant
      - neo4j
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:8-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  neo4j:
    image: neo4j:5-community
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:?Set NEO4J_AUTH in .env}
      - NEO4J_dbms_security_auth__enabled=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:?Set NEO4J_USER in .env} -p ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  qdrant_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  fastembed_cache:
  hf_cache:
