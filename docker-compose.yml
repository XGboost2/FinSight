services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
      - fastembed_cache:/root/.cache/fastembed
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://:${REDIS_PASSWORD:-finsight_dev}@redis:6379
      - HF_HOME=/root/.cache/huggingface
      - FASTEMBED_CACHE_PATH=/root/.cache/fastembed
    env_file:
      - .env
    depends_on:
      - qdrant
      - redis
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8000
      # Alpha Vantage calls should be proxied through the backend, not exposed to the browser
    depends_on:
      - backend
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: celery -A celery_app worker --loglevel=info --concurrency=1 --pool=solo
    working_dir: /app
    volumes:
      - ./backend:/app
      - fastembed_cache:/root/.cache/fastembed
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://:${REDIS_PASSWORD:-finsight_dev}@redis:6379
      - HF_HOME=/root/.cache/huggingface
      - FASTEMBED_CACHE_PATH=/root/.cache/fastembed
    env_file:
      - .env
    depends_on:
      - redis
      - qdrant
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:8-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-finsight_dev}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-finsight_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  qdrant_data:
  redis_data:
  fastembed_cache:
  hf_cache:
